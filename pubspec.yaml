name: medisync
description: "MediSync - Health Lifestyle Monitoring Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.9
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.9
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  app_links: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
